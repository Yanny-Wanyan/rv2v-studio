<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RV2V Studio — 实时视频编辑</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F3F0;
  --surface:rgba(255,255,255,.92);
  --border:rgba(0,0,0,.06);
  --text:#232226;
  --text2:#605D59;
  --text3:#9C9891;
  --accent:#FF6B4A;
  --accent-light:#FFF0EC;
  --magic:#8B7AFF;
  --magic-light:#F0EEFF;
  --radius:14px;
  --shadow:0 1px 3px rgba(0,0,0,.03),0 6px 20px rgba(0,0,0,.04);
}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes popUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes magicFlash{0%{opacity:0;transform:scaleX(0)}30%{opacity:1;transform:scaleX(1)}100%{opacity:0;transform:scaleX(1)}}
body{
  font-family:'DM Sans',-apple-system,'SF Pro Display','Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;
  background:var(--bg);
  color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;
}
.header{
  height:48px;background:rgba(255,255,255,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;
}
.brand{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;display:flex;align-items:center;gap:9px}
.brand .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.icon-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.5);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative}
.icon-btn:hover{border-color:rgba(0,0,0,.1);color:var(--text2);background:rgba(255,255,255,.8)}
.icon-btn:active{transform:scale(.92)}
.icon-btn svg{width:15px;height:15px}
.icon-btn::after{content:attr(data-tip);position:absolute;bottom:-28px;left:50%;transform:translateX(-50%) scale(.92);padding:3px 9px;border-radius:5px;background:#333;color:#fff;font-size:10px;white-space:nowrap;opacity:0;pointer-events:none;transition:all .12s;z-index:10}
.icon-btn:hover::after{opacity:1;transform:translateX(-50%) scale(1)}

.main{flex:1;display:flex;flex-direction:column;padding:12px 20px;max-width:1800px;width:100%;margin:0 auto;min-height:0}
.video-section{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:auto 0;align-items:start}
.video-panel{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}
.video-panel-header{height:40px;min-height:40px;max-height:40px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(255,255,255,.5);box-sizing:border-box;overflow:hidden}
.vp-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;color:#475569;letter-spacing:.8px;text-transform:uppercase;display:inline-flex;align-items:center;gap:7px;padding:0;background:transparent;border:none;box-shadow:none;transition:color .15s,opacity .15s;opacity:.9}
.vp-title:hover{color:#334155;opacity:1}
.vp-title i{font-size:11px;color:var(--text3)}
.vp-title.source i{color:var(--accent)}
.vp-title.output i{color:var(--accent)}
.vp-title .rec{width:5px;height:5px;border-radius:50%;background:#EF4444;animation:pulse 1.5s infinite}
.source-sel{display:flex;align-items:center;gap:3px;height:100%}
.src-btn{height:24px;min-height:24px;padding:0 8px;border-radius:5px;line-height:24px;font-size:10px;font-weight:500;color:var(--text3);border:none;background:transparent;cursor:pointer;transition:all .12s;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;gap:4px}
.src-btn:hover{color:var(--text2);background:rgba(255,255,255,.4)}
.src-btn.on{color:var(--accent);background:var(--accent-light)}
.vid-ctrls{display:flex;align-items:center;gap:4px;height:100%}
.ctrl-btn{height:24px;min-height:24px;padding:0 8px;border-radius:5px;line-height:24px;font-size:10px;font-weight:500;color:var(--text3);border:none;background:transparent;cursor:pointer;transition:all .12s;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap}
.ctrl-btn:hover{color:var(--text2);background:rgba(255,255,255,.4)}
.ctrl-btn.warn{color:#B45309}
.ctrl-btn.warn:hover{color:#92400E;background:rgba(251,191,36,.16)}
.ctrl-btn[disabled]{opacity:.4;cursor:not-allowed;pointer-events:none}
.video-body{aspect-ratio:16/9;position:relative;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#1A1920 0%,#1E1D24 40%,#1A1920 100%);overflow:hidden}
.video-body video{width:100%;height:100%;object-fit:contain;position:absolute;inset:0;z-index:2}
.v-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(255,255,255,.45)}
.v-placeholder i{font-size:24px}
.v-placeholder p{font-size:10px;opacity:.7}
.ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:5;cursor:pointer;transition:background .2s}
.ov:hover{background:rgba(0,0,0,.5)}
.ov-inner{text-align:center;color:rgba(255,255,255,.6)}
.ov-inner i{font-size:28px;margin-bottom:6px;display:block}
.ov-inner p{font-size:10px;opacity:.7}
.ov input[type=file]{display:none}
.ov-stream{cursor:default}
.ov-stream .sf{display:flex;gap:6px;width:320px;margin:0 auto}
.ov-stream .sf input{flex:1;padding:8px 11px;border-radius:7px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:11px;font-family:inherit}
.ov-stream .sf input::placeholder{color:rgba(255,255,255,.3)}
.ov-stream .sf input:focus{outline:none;border-color:var(--accent)}
.ov-stream .sf button{padding:8px 13px;border-radius:7px;border:none;background:var(--accent);color:#fff;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}
.ov-call{cursor:default}
.ov-call>div{display:flex;flex-direction:column;align-items:center}
.ov-call button{padding:10px 22px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;transition:all .15s}
.ov-call button:hover{background:rgba(255,255,255,.1)}
.rec-btn{height:24px;min-height:24px;padding:0 8px;border-radius:5px;line-height:24px;font-size:10px;font-weight:500;color:var(--text3);border:none;background:transparent;cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;gap:4px;position:relative}
.rec-btn:hover{color:var(--text2);background:rgba(255,255,255,.4)}
.rec-btn[disabled]{opacity:.4;cursor:not-allowed;pointer-events:none}
.rec-btn .rec-ico{width:12px;height:12px;flex-shrink:0}
.rec-btn .rec-ico circle.ring{fill:none;stroke:var(--text3);stroke-width:1.5;transition:stroke .15s}
.rec-btn .rec-ico circle.dot{fill:var(--text3);transition:fill .15s}
.rec-btn.recording{color:#DC2626}
.rec-btn.recording .rec-ico circle.ring{stroke:#DC2626}
.rec-btn.recording .rec-ico circle.dot{fill:#DC2626;animation:pulse 1.2s infinite}
.rec-btn.recording:hover{background:rgba(220,38,38,.08)}
.global-tip{position:fixed;padding:3px 9px;border-radius:5px;background:#333;color:#fff;font-size:10px;white-space:nowrap;pointer-events:none;z-index:9999;opacity:0;transition:opacity .12s;transform:translateX(-50%)}
.global-tip.show{opacity:1}
.ed-mute{position:absolute;right:10px;bottom:10px;z-index:9;width:28px;height:28px;border-radius:50%;border:none;background:rgba(15,23,42,.45);backdrop-filter:blur(6px);color:rgba(255,255,255,.8);display:none;align-items:center;justify-content:center;cursor:default}
.ed-mute.show{display:flex}
.ed-mute i{font-size:10px}
.ed-mute::after{content:attr(data-tip);position:absolute;top:-28px;left:50%;transform:translateX(-50%) scale(.92);padding:3px 9px;border-radius:5px;background:#333;color:#fff;font-size:10px;white-space:nowrap;opacity:0;pointer-events:none;transition:all .12s;z-index:10}
.ed-mute:hover::after{opacity:1;transform:translateX(-50%) scale(1)}
.ed-badge{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:5px;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);font-size:9px;color:rgba(255,255,255,.72);display:flex;align-items:center;gap:4px}
.ed-badge i{width:4px;height:4px;border-radius:50%;background:#9CA3AF;display:inline-block}
.ed-badge.rendering i{background:var(--accent);animation:pulse 1.2s infinite}
.ed-badge.done i{background:#22C55E}
.ed-badge.error i{background:#EF4444}

/* Magic flash bar — output panel signature */
.video-panel.output-panel::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:2px;
  background:linear-gradient(90deg,transparent,var(--magic),transparent);
  border-radius:1px;opacity:0;transform:scaleX(0);z-index:10;pointer-events:none;
  transition:none;
}
.video-panel.output-panel.flash::before{animation:magicFlash .6s ease forwards}

/* Command bar */
.command-bar{flex-shrink:0;position:relative;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:12px 16px;margin-top:12px}

/* History — always visible */
.cmd-history{max-height:40px;overflow-y:auto;margin-bottom:10px;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.06) transparent}
.cmd-history::-webkit-scrollbar{width:2px}
.cmd-history::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);border-radius:2px}
.h-empty{display:flex;align-items:center;gap:6px;padding:6px 11px;font-size:12px;color:var(--text3)}
.h-empty i{font-size:10px;opacity:.5}
.h-item{display:flex;align-items:center;gap:8px;padding:6px 11px;border-radius:7px;background:rgba(0,0,0,.03);font-size:12px;color:var(--text2);margin-bottom:3px;position:relative}
.h-item:last-child{margin-bottom:0}
.h-item .h-dot{width:4px;height:4px;border-radius:50%;background:#22C55E;flex-shrink:0}
.h-item .h-thumb{width:20px;height:20px;border-radius:4px;object-fit:cover;cursor:pointer;flex-shrink:0;border:1px solid var(--border)}
.h-item .h-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-vote{display:flex;align-items:center;gap:0;flex-shrink:0;margin-left:6px}
.h-vote button{width:22px;height:22px;border:none;background:transparent;color:var(--text3);opacity:.4;cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .12s;padding:0}
.h-vote button:hover{opacity:.8;background:rgba(0,0,0,.04)}
.h-vote button.voted-up{color:var(--accent);opacity:1}
.h-vote button.voted-down{color:var(--text3);opacity:1}
/* Image preview popover on history item */
.h-preview{display:none;position:absolute;bottom:calc(100% + 6px);left:30px;width:160px;border-radius:8px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.12);border:1px solid var(--border);z-index:30;background:#fff}
.h-preview.show{display:block;animation:fadeIn .15s ease}
.h-preview img{width:100%;display:block}

/* Input row — image slot beside capsule */
.input-row{display:flex;align-items:center;gap:10px}

/* Image slot — 3:4 tilted card, sits outside capsule */
.img-slot{
  width:32px;height:42px;border-radius:6px;flex-shrink:0;
  border:1.5px dashed rgba(0,0,0,.12);
  display:flex;align-items:center;justify-content:center;
  cursor:not-allowed;overflow:visible;position:relative;
  transition:all .15s;
  transform:rotate(-6deg);
  background:rgba(255,255,255,.4);
}
.img-slot:hover{border-color:rgba(0,0,0,.1);background:rgba(0,0,0,.02)}
.img-slot::after{content:'当前版本暂不支持上传参考图';position:absolute;top:50%;left:calc(100% + 10px);transform:translateY(-50%) rotate(6deg);padding:4px 10px;border-radius:5px;background:#333;color:#fff;font-size:10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .12s;z-index:10}
.img-slot:hover::after{opacity:1}
.img-slot .slot-icon{font-size:13px;color:var(--text3);opacity:.45;font-weight:300}
.img-slot img{display:none}
.img-slot input{display:none}

/* Input capsule */
.input-capsule{flex:1;display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--radius);background:rgba(255,255,255,.5);padding:4px 4px 4px 6px;transition:border-color .2s,box-shadow .2s;gap:2px}
.input-capsule:focus-within{border-color:rgba(255,107,74,.3);box-shadow:0 0 0 3px rgba(255,107,74,.06)}

.cap-btn{width:34px;height:34px;border-radius:50%;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;position:relative}
.cap-btn:hover{color:var(--text2);background:rgba(0,0,0,.04)}
.cap-btn:active{transform:scale(.9)}
.cap-btn svg{width:15px;height:15px}
.cap-btn::after{content:attr(data-tip);position:absolute;bottom:-26px;left:50%;transform:translateX(-50%) scale(.9);padding:3px 8px;border-radius:4px;background:#333;color:#fff;font-size:9px;white-space:nowrap;opacity:0;pointer-events:none;transition:all .1s;z-index:10}
.cap-btn:hover::after{opacity:1;transform:translateX(-50%) scale(1)}
.cap-btn.sparkling svg{color:var(--accent)}
.cap-input{flex:1;height:36px;line-height:36px;border:none;background:transparent;font-size:14px;color:var(--text);font-family:inherit;outline:none;padding:0 6px}
.cap-input::placeholder{color:var(--text3)}
.cap-send{width:36px;height:36px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.cap-send:hover{background:#E5552E}
.cap-send:active{transform:scale(.92)}
.cap-send i{font-size:11px}

/* Scene row */
.scene-row{display:flex;gap:6px;margin-top:10px;align-items:center}
.scene-row .lbl{font-size:10px;color:var(--text3);font-weight:500;margin-right:2px}
.s-tag{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.5);font-size:12px;color:var(--text2);cursor:pointer;transition:all .12s;font-family:inherit}
.s-tag:hover{border-color:var(--accent);color:var(--accent)}
.s-tag.on{background:var(--accent-light);border-color:rgba(255,107,74,.18);color:var(--accent);font-weight:500}

/* Expand panel */
.exp-panel{display:none;position:absolute;bottom:100%;left:0;right:0;margin-bottom:8px;padding:14px;background:#fff;border-radius:var(--radius);border:1px solid rgba(0,0,0,.05);box-shadow:0 -4px 30px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);z-index:20;animation:popUp .2s ease}
.exp-panel.show{display:block}
.exp-hd{display:flex;align-items:center;margin-bottom:9px}
.exp-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;color:var(--text);letter-spacing:.5px;text-transform:uppercase}
.exp-note{font-size:10px;color:var(--text3);margin-left:10px;font-weight:400}
.exp-close{width:20px;height:20px;border-radius:5px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;margin-left:auto}
.exp-close:hover{background:rgba(0,0,0,.05);color:var(--text)}

/* Option tags — used by all scene panels */
.opt-row{display:flex;gap:6px;flex-wrap:wrap}
.opt-tag{padding:6px 14px;border-radius:14px;border:1px solid rgba(0,0,0,.06);background:rgba(255,255,255,.6);font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .12s}
.opt-tag:hover{border-color:var(--accent);color:var(--accent)}
.opt-tag.on{background:var(--accent-light);border-color:rgba(255,107,74,.18);color:var(--accent);font-weight:500}

.hidden{display:none!important}
.alert-mask{position:fixed;inset:0;background:rgba(0,0,0,.28);display:none;align-items:center;justify-content:center;z-index:90}
.alert-mask.show{display:flex}
.alert-box{min-width:320px;max-width:520px;background:#fff;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.2);padding:18px 18px 14px;display:flex;align-items:flex-start;gap:10px}
.alert-ico{width:22px;height:22px;border-radius:50%;background:#EF4444;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.alert-main{flex:1}
.alert-text{font-size:14px;color:var(--text);line-height:1.5}
.alert-actions{margin-top:12px;display:flex;justify-content:flex-end}
.alert-actions button{padding:7px 14px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:12px;cursor:pointer}
.call-note{display:none;margin-top:8px;padding:8px 14px;border-radius:8px;background:rgba(251,191,36,.1);border-left:3px solid #F59E0B;font-size:11px;color:#92400E;line-height:1.4;flex-shrink:0;align-items:center;gap:7px}
.call-note.show{display:flex}
.call-note i{font-size:12px;color:#D97706;flex-shrink:0}
.ov-call-tip{margin-top:14px;font-size:10px;color:rgba(255,255,255,.55);line-height:1.4;text-align:center}
.video-vol{position:absolute;right:10px;bottom:10px;z-index:9;display:none;align-items:center;gap:0}
.video-vol.show{display:flex}
.vol-btn{width:28px;height:28px;border-radius:50%;border:none;background:rgba(15,23,42,.45);backdrop-filter:blur(6px);color:rgba(255,255,255,.8);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.vol-btn:hover{background:rgba(15,23,42,.65)}
.vol-btn i{font-size:10px}
.vol-slider{width:0;overflow:hidden;transition:width .2s ease,padding .2s ease,opacity .2s ease;opacity:0;display:flex;align-items:center;padding:0;background:rgba(15,23,42,.45);backdrop-filter:blur(6px);border-radius:14px;margin-right:4px;height:28px}
.vol-slider.open{width:80px;padding:0 10px;opacity:1}
.vol-slider input[type=range]{width:100%;height:3px;accent-color:var(--accent);cursor:pointer}
.toast-anchor{flex-shrink:0;display:flex;justify-content:center;height:0;position:relative;z-index:12}
.mini-toast{position:absolute;bottom:4px;background:rgba(17,24,39,.92);color:#fff;border-radius:999px;padding:8px 14px;font-size:12px;line-height:1;display:none;align-items:center;gap:7px;box-shadow:0 8px 24px rgba(0,0,0,.22);max-width:420px;white-space:nowrap}
.mini-toast.show{display:flex;animation:fadeIn .18s ease}
.mini-toast i{color:#FCA5A5}
@media(max-width:900px){.video-section{grid-template-columns:1fr}.main{padding:10px}}
</style>
</head>
<body>

<div class="header">
  <div class="brand"><span class="dot"></span>JoyAI-Video-Edit<span style="font-weight:400;font-size:12px;color:var(--text3);margin-left:6px">流式视频编辑体验</span></div>
  <button class="icon-btn" data-tip="新建会话" onclick="newSession()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      <line x1="12" y1="9" x2="12" y2="15"/><line x1="9" y1="12" x2="15" y2="12"/>
    </svg>
  </button>
</div>

<div class="main">
  <div class="video-section">
    <div class="video-panel">
      <div class="video-panel-header">
        <div class="vp-title source"><i class="fa-solid fa-camera"></i>原始画面</div>
        <div class="source-sel">
          <button class="src-btn on" onclick="switchSrc('upload',this)"><i class="fas fa-upload"></i> 上传</button>
          <button class="src-btn" onclick="switchSrc('stream',this)"><i class="fas fa-signal"></i> 直播流</button>
          <button class="src-btn" onclick="switchSrc('call',this)"><i class="fas fa-camera"></i> 摄像头</button>
        </div>
        <div class="vid-ctrls">

<script>
/* === Video source === */
function switchSrc(t,el){
  document.querySelectorAll('.src-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  // If video is playing, reset both sides
  var v=document.getElementById('camVid');
  var ev=document.getElementById('edVid');
  if(window.activeInput&&window.activeInput!=='none'){
    if(window.camStream){window.camStream.getTracks().forEach(tr=>tr.stop());window.camStream=null}
    if(v.src){URL.revokeObjectURL(v.src)}
    v.pause();v.classList.add('hidden');v.src='';v.srcObject=null;
    ev.pause();ev.classList.add('hidden');ev.src='';
    document.getElementById('camPH').classList.remove('hidden');
    document.getElementById('camPH').innerHTML='<i class="fas fa-video-slash"></i><p>等待视频输入</p>';
    document.getElementById('edPH').classList.remove('hidden');
    document.getElementById('volDock').classList.remove('show');
    document.getElementById('callNote').classList.remove('show');
    endRealtimeSession();
    window.activeInput='none';setPauseUi(false);
    updateControlState();
  }
  document.getElementById('ovUpload').classList.toggle('hidden',t!=='upload');
  document.getElementById('ovStream').classList.toggle('hidden',t!=='stream');
  document.getElementById('ovCall').classList.toggle('hidden',t!=='call');
  document.getElementById('volDock').classList.remove('show');
  window.srcTab=t;
  updateRecBtnState();
}
function setCamVolume(v){
  var vol=Math.max(0,Math.min(100,Number(v||0)))/100;
  var cv=document.getElementById('camVid');
  var ev=document.getElementById('edVid');
  cv.muted=false;ev.muted=false;
  cv.volume=vol;ev.volume=vol;
  document.getElementById('volIcon').className=vol===0?'fas fa-volume-xmark':'fas fa-volume-up';
}
function toggleVol(){
  document.getElementById('volSlider').classList.toggle('open');
}
function onUpload(e){
  var f=e.target.files[0];if(!f)return;
  if(f.type && !f.type.startsWith('video/')){showAlert('仅支持视频文件上传');return}
  var u=URL.createObjectURL(f);
  var probeUrl=URL.createObjectURL(f);
  var v=document.getElementById('camVid');
  var probe=document.createElement('video');
  probe.preload='metadata';
  var handled=false;
  function proceed(){
    if(handled)return;handled=true;
    var d=probe.duration||0;
    URL.revokeObjectURL(probeUrl);
    if(d>300){
      URL.revokeObjectURL(u);
      showAlert('上传失败，视频最长5分钟');
      return;
    }
    if(window.camStream){window.camStream.getTracks().forEach(t=>t.stop());window.camStream=null}
    v.src=u;v.classList.remove('hidden');v.play();hideOvs();
    document.getElementById('camPH').classList.add('hidden');
    var ev=document.getElementById('edVid');ev.src=u;ev.classList.remove('hidden');ev.play();
    document.getElementById('edPH').classList.add('hidden');
    window.activeInput='upload';setPauseUi(false);updateControlState();updateRecBtnState();
    document.getElementById('callNote').classList.remove('show');
    document.getElementById('volDock').classList.add('show');
    setCamVolume(document.getElementById('volRange').value);
  }
  probe.onloadedmetadata=proceed;
  probe.onerror=function(){URL.revokeObjectURL(probeUrl);URL.revokeObjectURL(u);showAlert('上传失败，请重试');};
  probe.src=probeUrl;
  setTimeout(function(){if(!handled)proceed()},2000);
}
function beginRealtimeSession(){
  window.sessionStartAt=Date.now();
  if(window.sessionTimer)clearInterval(window.sessionTimer);
  window.sessionEnded=false;
  window.sessionTimer=setInterval(function(){
    if(!window.sessionStartAt||window.sessionEnded)return;
    if(Date.now()-window.sessionStartAt>=3600*1000){
      window.sessionEnded=true;
      showAlert('已达到1小时最长交互时长，对话已结束，您可重新发起新对话');
    }
  },1000);
}
function endRealtimeSession(){
  if(window.sessionTimer){clearInterval(window.sessionTimer);window.sessionTimer=null}
  window.sessionStartAt=null;
  window.sessionEnded=false;
}
function doStream(){
  var u=document.getElementById('streamUrl').value;if(!u)return;hideOvs();
  if(window.camStream){window.camStream.getTracks().forEach(t=>t.stop());window.camStream=null}
  var ph=document.getElementById('camPH');ph.classList.remove('hidden');
  ph.innerHTML='<i class="fas fa-signal" style="animation:pulse 1.5s infinite"></i><p style="color:#22C55E">直播流已接入</p>';
  document.getElementById('camVid').classList.add('hidden');
  document.getElementById('edVid').classList.add('hidden');
  document.getElementById('edPH').classList.remove('hidden');
  document.getElementById('callNote').classList.remove('show');
  document.getElementById('volDock').classList.add('show');
  setCamVolume(document.getElementById('volRange').value);
  beginRealtimeSession();
  window.activeInput='stream';setPauseUi(false);updateControlState();updateRecBtnState();
}
function doCall(){
  hideOvs();document.getElementById('camPH').classList.add('hidden');
  navigator.mediaDevices.getUserMedia({video:true}).then(s=>{
    if(window.camStream){window.camStream.getTracks().forEach(t=>t.stop())}
    window.camStream=s;
    var v=document.getElementById('camVid');v.srcObject=s;v.classList.remove('hidden');v.play();
    document.getElementById('callNote').classList.add('show');
    document.getElementById('volDock').classList.remove('show');
    beginRealtimeSession();
    window.activeInput='call';setPauseUi(false);updateControlState();updateRecBtnState();
  }).catch(()=>{
    var ph=document.getElementById('camPH');ph.classList.remove('hidden');
    ph.innerHTML='<i class="fas fa-video-slash"></i><p>摄像头权限被拒绝</p>';
  });
}
function hideOvs(){['ovUpload','ovStream','ovCall'].forEach(id=>document.getElementById(id).classList.add('hidden'))}
function setPauseUi(paused){
  var b=document.getElementById('pauseBtn');if(!b)return;
  b.innerHTML=paused?'<i class="fas fa-play"></i> 继续':'<i class="fas fa-pause"></i> 暂停';
}
function updateControlState(){
  var canReplay=window.activeInput==='upload'&&!document.getElementById('camVid').classList.contains('hidden');
  var canPause=(window.activeInput==='upload'||window.activeInput==='call')&&!document.getElementById('camVid').classList.contains('hidden');
  document.getElementById('replayBtn').disabled=!canReplay;
  document.getElementById('pauseBtn').disabled=!canPause;
}
function togglePause(){
  var v=document.getElementById('camVid');
  var ev=document.getElementById('edVid');
  if(window.activeInput==='stream')return;
  if(v.classList.contains('hidden'))return;
  var paused=!v.paused;
  if(paused){v.pause();if(!ev.classList.contains('hidden'))ev.pause()}else{v.play();if(!ev.classList.contains('hidden'))ev.play()}
  setPauseUi(paused);
}
function replayVideo(){
  if(window.activeInput!=='upload')return;
  var v=document.getElementById('camVid');
  var ev=document.getElementById('edVid');
  if(v.classList.contains('hidden'))return;
  v.currentTime=0;v.play();
  if(!ev.classList.contains('hidden')){ev.currentTime=0;ev.play()}
  setPauseUi(false);
}
function stopSession(){
  var v=document.getElementById('camVid');
  var ev=document.getElementById('edVid');
  if(window.camStream){window.camStream.getTracks().forEach(t=>t.stop());window.camStream=null}
  if(v.src){URL.revokeObjectURL(v.src)}
  v.pause();v.classList.add('hidden');v.src='';v.srcObject=null;
  ev.pause();ev.classList.add('hidden');ev.src='';
  document.getElementById('camPH').classList.remove('hidden');
  document.getElementById('camPH').innerHTML='<i class="fas fa-video-slash"></i><p>等待视频输入</p>';
  document.getElementById('edPH').classList.remove('hidden');
  document.getElementById('ovUpload').classList.remove('hidden');
  document.getElementById('ovStream').classList.add('hidden');
  document.getElementById('ovCall').classList.add('hidden');
  document.querySelectorAll('.src-btn').forEach((b,i)=>b.classList.toggle('on',i===0));
  document.getElementById('callNote').classList.remove('show');
  document.getElementById('volDock').classList.remove('show');
  endRealtimeSession();
  window.activeInput='none';setPauseUi(false);
  stopRec();updateControlState();updateRecBtnState();
}

/* === Record edited stream === */
var recStream=null,recChunks=[],recTimer=null,recStart=0,recCanvas=null,recCtx=null,recRaf=null;
function toggleRec(){
  var btn=document.getElementById('recBtn');
  if(btn.classList.contains('recording')){stopRec();return}
  var ev=document.getElementById('edVid');
  if(ev.classList.contains('hidden'))return;
  recCanvas=document.createElement('canvas');
  recCanvas.width=854;recCanvas.height=480;
  recCtx=recCanvas.getContext('2d');
  function drawFrame(){recCtx.drawImage(ev,0,0,854,480);recRaf=requestAnimationFrame(drawFrame)}
  drawFrame();
  var cStream=recCanvas.captureStream(30);
  var opts={mimeType:'video/webm;codecs=vp9'};
  if(!MediaRecorder.isTypeSupported(opts.mimeType))opts={mimeType:'video/webm'};
  recStream=new MediaRecorder(cStream,opts);
  recChunks=[];
  recStream.ondataavailable=function(e){if(e.data.size>0)recChunks.push(e.data)};
  recStream.onstop=function(){
    cancelAnimationFrame(recRaf);recRaf=null;recCanvas=null;recCtx=null;
    var blob=new Blob(recChunks,{type:'video/mp4'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='rv2v_edit_'+Date.now()+'.mp4';
    a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href)},1000);
  };
  recStream.start();
  recStart=Date.now();
  btn.classList.add('recording');
  btn.setAttribute('data-tip','点击停止并下载');
  document.getElementById('recLabel').textContent='0:00';
  recTimer=setInterval(updateRecTime,1000);
}
function stopRec(){
  if(recStream&&recStream.state==='recording')recStream.stop();
  recStream=null;
  if(recRaf){cancelAnimationFrame(recRaf);recRaf=null}
  recCanvas=null;recCtx=null;
  clearInterval(recTimer);recTimer=null;
  var btn=document.getElementById('recBtn');
  btn.classList.remove('recording');
  updateRecBtnState();
}
function updateRecTime(){
  var s=Math.floor((Date.now()-recStart)/1000);
  var m=Math.floor(s/60);s=s%60;
  document.getElementById('recLabel').textContent=m+':'+(s<10?'0':'')+s;
}
function updateRecBtnState(){
  var ev=document.getElementById('edVid');
  var hidden=ev.classList.contains('hidden');
  var btn=document.getElementById('recBtn');
  document.getElementById('edMute').classList.toggle('show',!hidden);
  var isUpload=(window.srcTab||'upload')==='upload';
  if(isUpload){
    btn.innerHTML='<i class="fas fa-download" style="font-size:10px"></i><span id="recLabel">下载</span>';
    btn.setAttribute('data-tip','下载编辑结果');
    var done=document.getElementById('renderBadge')&&document.getElementById('renderBadge').classList.contains('done');
    btn.disabled=hidden||!done;
  }else{
    btn.innerHTML='<svg class="rec-ico" viewBox="0 0 12 12"><circle class="ring" cx="6" cy="6" r="5"/><circle class="dot" cx="6" cy="6" r="2.5"/></svg><span id="recLabel">录制</span>';
    btn.setAttribute('data-tip','录制编辑片段');
    btn.disabled=hidden;
  }
}
function handleRecBtn(){
  if((window.srcTab||'upload')==='upload'){downloadEdit()}else{toggleRec()}
}
function downloadEdit(){
  var ev=document.getElementById('edVid');
  if(ev.classList.contains('hidden')||!ev.src)return;
  var canvas=document.createElement('canvas');
  canvas.width=854;canvas.height=480;
  var ctx=canvas.getContext('2d');
  var stream=canvas.captureStream(30);
  var opts={mimeType:'video/webm;codecs=vp9'};
  if(!MediaRecorder.isTypeSupported(opts.mimeType))opts={mimeType:'video/webm'};
  var mr=new MediaRecorder(stream,opts);
  var chunks=[];
  mr.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data)};
  mr.onstop=function(){
    var blob=new Blob(chunks,{type:'video/mp4'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='rv2v_edit_'+Date.now()+'.mp4';
    a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href)},1000);
  };
  var clone=ev.cloneNode(true);
  clone.muted=true;clone.currentTime=0;clone.play();
  mr.start();
  function draw(){ctx.drawImage(clone,0,0,854,480);if(!clone.ended)requestAnimationFrame(draw);else mr.stop()}
  clone.addEventListener('seeked',function(){clone.play()});
  clone.addEventListener('playing',function(){draw()});
  clone.addEventListener('ended',function(){mr.stop()});
}

/* === Image slot in input === */
var slotImgData=null;
function onSlotImg(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();r.onload=ev=>{setSlotImg(ev.target.result)};r.readAsDataURL(f);e.target.value='';
}
function setSlotImg(src){
  slotImgData=src;
  document.getElementById('slotImg').src=src;
  document.getElementById('imgSlot').classList.add('has-img');
}
function rmSlotImg(){
  slotImgData=null;
  document.getElementById('slotImg').src='';
  document.getElementById('imgSlot').classList.remove('has-img');
}

/* === Panels === */
function toggleScene(t,el){
  var p=document.getElementById('p_'+t),open=p.classList.contains('show');
  document.querySelectorAll('.exp-panel').forEach(x=>x.classList.remove('show'));
  document.querySelectorAll('.s-tag').forEach(x=>x.classList.remove('on'));
  if(!open){p.classList.add('show');el.classList.add('on')}
}
function closeP(t){
  document.getElementById('p_'+t).classList.remove('show');
  document.querySelectorAll('.s-tag').forEach(x=>x.classList.remove('on'));
}
document.addEventListener('mousedown',function(e){
  if(!document.querySelector('.exp-panel.show'))return;
  if(e.target.closest('.exp-panel')||e.target.closest('.s-tag'))return;
  document.querySelectorAll('.exp-panel').forEach(x=>x.classList.remove('show'));
  document.querySelectorAll('.s-tag').forEach(x=>x.classList.remove('on'));
});

    '像素游戏':'画面变成像素风，8-bit复古游戏画面'
  },
  scene:{
    '户外草地':'背景换为阳光下的户外草地',
    '咖啡厅':'背景换为咖啡厅内，暖黄灯光',
    '海边日落':'背景换为海边日落，沙滩海浪橙红天空',
    '城市街道':'背景换为城市街道，车流和高楼',
    '图书馆':'背景换为图书馆，书架排列光线柔和'
  },
  local_edit:{
    '换发色银白':'头发变成银白色',
    '戴上墨镜':'戴上黑色墨镜',
    '去掉眼镜':'去掉眼镜，还原五官',
    '加一只橘猫':'肩头趴一只橘猫在打盹',
    '手持咖啡杯':'手里拿一杯热咖啡',
    '添加耳环':'戴上金色圆环耳环'
  }
};
function pickOpt(el,grp){
  var was=el.classList.contains('on');
  el.parentElement.querySelectorAll('.opt-tag').forEach(x=>x.classList.remove('on'));
  var inp=document.getElementById('chatIn');
  if(!was){el.classList.add('on');inp.value=OPT_PROMPTS[grp][el.textContent]||el.textContent;inp.focus()}
  else{inp.value=''}
}

/* === History === */
var hist=[];
function renderHist(){
  var el=document.getElementById('history'),list=document.getElementById('histList');
  if(!hist.length){list.innerHTML='<div class="h-empty"><i class="fas fa-clock-rotate-left"></i>发送的指令会出现在这里</div>';return}
  list.innerHTML=hist.map((h,i)=>{
    var thumbHtml=h.img?'<img class="h-thumb" src="'+h.img+'" onclick="event.stopPropagation();togglePreview('+i+')">':'';
    var upCls=h.vote===1?'voted-up':'';
    var downCls=h.vote===-1?'voted-down':'';
    return '<div class="h-item"><span class="h-dot"></span>'+thumbHtml+'<span class="h-text">'+h.text+'</span><div class="h-vote"><button class="'+upCls+'" onclick="event.stopPropagation();voteHist('+i+',1)"><i class="fas fa-thumbs-up"></i></button><button class="'+downCls+'" onclick="event.stopPropagation();voteHist('+i+',-1)"><i class="fas fa-thumbs-down"></i></button></div><div class="h-preview" id="hp_'+i+'"><img src="'+(h.img||'')+'"></div></div>';
  }).join('');
  el.scrollTop=el.scrollHeight;
}
function voteHist(i,v){
  hist[i].vote=hist[i].vote===v?0:v;
  renderHist();
}
function togglePreview(i){
  var pv=document.getElementById('hp_'+i);
  var open=pv.classList.contains('show');
  document.querySelectorAll('.h-preview').forEach(x=>x.classList.remove('show'));
  if(!open)pv.classList.add('show');
}
document.addEventListener('mousedown',function(e){
  if(!e.target.closest('.h-preview')&&!e.target.closest('.h-thumb'))
    document.querySelectorAll('.h-preview').forEach(x=>x.classList.remove('show'));
  if(!e.target.closest('.video-vol')){
    var s=document.getElementById('volSlider');if(s)s.classList.remove('open');
  }
});

/* === Spark === */
var PROMPTS=[
  '画面转为赛博朋克风，霓虹灯光暗色调',
  '背景换为海边日落，沙滩海浪橙红天空',
  '画面变成黑白水墨画风格，留白大量',
  '换上黑色皮夹克，拉链半开',
  '头发变成银白色',
  '画面变成像素风，8-bit复古游戏画面',
  '肩头趴一只橘猫在打盹'
];
function doSpark(){
  var btn=document.getElementById('sparkBtn');btn.classList.remove('sparkling');void btn.offsetHeight;btn.classList.add('sparkling');
  setTimeout(()=>btn.classList.remove('sparkling'),450);
  document.getElementById('chatIn').value=PROMPTS[Math.floor(Math.random()*PROMPTS.length)];document.getElementById('chatIn').focus();
}

function showAlert(msg){
  showMiniToast(msg);
}
function closeAlert(){document.getElementById('alertMask').classList.remove('show')}
function showServerBusyAlert(){showAlert('服务器繁忙，请稍后再试')}
var miniToastTimer=null;
function showMiniToast(msg){
  var el=document.getElementById('miniToast');
  document.getElementById('miniToastText').textContent=msg;
  el.classList.add('show');
  if(miniToastTimer)clearTimeout(miniToastTimer);
  miniToastTimer=setTimeout(function(){el.classList.remove('show');miniToastTimer=null;},2500);
}

/* === Send === */
var renderTimer=null;
function setRenderState(state){
  var badge=document.getElementById('renderBadge');
  var text=document.getElementById('renderText');
  var outPanel=document.querySelector('.output-panel');
  if(!badge||!text)return;
  badge.classList.remove('rendering','done','error');
  if(outPanel)outPanel.classList.remove('flash');
  if(state==='idle'){text.textContent='待机';return}
  if(state==='rendering'){badge.classList.add('rendering');text.textContent='渲染中';updateRecBtnState();return}
  if(state==='done'){badge.classList.add('done');text.textContent='已完成';if(outPanel){void outPanel.offsetWidth;outPanel.classList.add('flash')}updateRecBtnState();return}
  if(state==='error'){badge.classList.add('error');text.textContent='失败';updateRecBtnState();return}
}
function send(){
  var inp=document.getElementById('chatIn'),v=inp.value.trim();
  if(!v)return;
  if(window.sessionEnded){showAlert('对话已结束');return}
  if(renderTimer)clearTimeout(renderTimer);
  setRenderState('rendering');
  hist.push({text:v,img:null,vote:0});
  renderHist();inp.value='';
  renderTimer=setTimeout(function(){
    var ok=Math.random()>0.12;
    setRenderState(ok?'done':'error');
    renderTimer=null;
  },1200);
}
document.getElementById('chatIn').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();send()}});

/* === Drag video === */
document.getElementById('camBody').addEventListener('dragover',e=>e.preventDefault());
document.getElementById('camBody').addEventListener('drop',e=>{e.preventDefault();var f=e.dataTransfer.files[0];if(f&&f.type.startsWith('video/'))onUpload({target:{files:[f]}})});

/* === New session === */
function newSession(){
  stopSession();
  if(renderTimer){clearTimeout(renderTimer);renderTimer=null}
  setRenderState('idle');
  document.getElementById('chatIn').value='';hist=[];renderHist();rmSlotImg();
  document.querySelectorAll('.exp-panel').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.s-tag').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.card-item').forEach(t=>t.classList.remove('on'));
}
window.activeInput='none';
window.srcTab='upload';
updateControlState();updateRecBtnState();
setRenderState('idle');

/* === Global tooltip for clipped elements === */
(function(){
  var tip=document.getElementById('globalTip');
  document.querySelectorAll('[data-tip]').forEach(function(el){
    if(el.classList.contains('cap-btn'))return;
    el.addEventListener('mouseenter',function(){
      if(el.disabled)return;
      tip.textContent=el.getAttribute('data-tip');
      var r=el.getBoundingClientRect();
      tip.style.left=r.left+r.width/2+'px';
      tip.style.top=r.top-28+'px';
      tip.classList.add('show');
    });
    el.addEventListener('mouseleave',function(){tip.classList.remove('show')});
  });
})();
</script>
